name: foodwasteapp
description: "Food Waste App — connects university campus food businesses with nearby users to reduce surplus food waste."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.5
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^3.0.0
  go_router: ^14.6.2
  google_maps_flutter: ^2.9.0
  intl: ^0.20.1
  riverpod_annotation: ^2.3.5
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  custom_lint: ^0.7.5
  flutter_lints: ^6.0.0
  freezed: ^3.0.0
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.13

